<!DOCTYPE html>
<html>
<head>

<title>Watch Video</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Segoe UI;
margin:0;
}

/* PAGE CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding-top:40px;
}

/* VIDEO PLAYER */

.video-player{
width:100%;
border-radius:10px;
}

/* VIDEO TITLE */

.video-title{
font-size:20px;
margin-top:15px;
}

/* BUTTON AREA */

.buttons{
margin-top:15px;
display:flex;
gap:10px;
}

</style>

</head>

<body>

<div class="container">

<h3>🎬 Video Player</h3>

<video class="video-player" controls autoplay>

<source src="/uploads/{{filename}}" type="video/mp4">

Your browser does not support video.

</video>

<div class="video-title">

{{filename}}

</div>

<div class="buttons">

<a href="/home" class="btn btn-light">
⬅ Back
</a>

<a href="/delete/{{filename}}" class="btn btn-danger">
🗑 Delete
</a>

</div>

</div>

</body>
</html>
