<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:'Segoe UI',sans-serif;
}

.register-card{
width:320px;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

.logo{
text-align:center;
font-size:26px;
font-weight:bold;
color:#ff0000;
margin-bottom:20px;
}

.input-group-text{
background:#f1f1f1;
border:none;
}

.form-control{
border:none;
background:#f7f7f7;
height:42px;
}

.form-control:focus{
box-shadow:none;
background:#f0f0f0;
}

.password-box{
position:relative;
}

.password-box i{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
color:#666;
}

.register-btn{
background:#ff0000;
border:none;
height:40px;
}

.register-btn:hover{
background:#cc0000;
}

.login-link{
text-align:center;
margin-top:12px;
font-size:14px;
}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">
🎬 MiniTube
</div>

<form method="POST" action="/register_user">

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required
>

</div>

<div class="password-box">

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Password"
required
>

<i class="fa fa-eye" onclick="togglePassword()"></i>

</div>

<br>

<button class="btn register-btn w-100">
Create Account
</button>

</form>

<div class="login-link">

Already have an account?

<a href="/">Login</a>

</div>

</div>

<script>

function togglePassword(){

var password=document.getElementById("password")

if(password.type==="password"){
password.type="text"
}else{
password.type="password"
}

}

</script>

</body>
</html>
