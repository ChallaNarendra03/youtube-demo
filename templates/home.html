<!DOCTYPE html>
<html>
<head>

<title>MiniTube</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Segoe UI;
margin:0;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#181818;
padding-top:70px;
}

.sidebar a{
display:block;
padding:14px 20px;
color:white;
text-decoration:none;
font-size:15px;
}

.sidebar a:hover{
background:#333;
}

/* NAVBAR */

.navbar{
background:#202020;
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
margin-left:220px;
}

/* SEARCH AREA */

.search-area{
display:flex;
align-items:center;
gap:10px;
}

.search-bar{
display:none;
width:350px;
border-radius:20px;
}

/* MIC BUTTON */

.mic-btn{
width:40px;
height:40px;
background:#303030;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.mic-btn:hover{
background:#444;
}

/* AVATAR */

.avatar{
width:40px;
height:40px;
background:#ff0000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* CONTENT */

.content{
margin-left:240px;
padding:25px;
}

/* VIDEO GRID */

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
gap:22px;
}

.video-card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.video-card:hover{
transform:scale(1.02);
}

.video-card video{
width:100%;
height:260px;
object-fit:cover;
}

.video-info{
padding:12px;
}

.video-buttons{
margin-top:8px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<a href="/home">🏠 Home</a>

<a href="#">🎬 Shorts</a>

<a href="#">⭐ Recommendations</a>

<a href="#">📺 Subscriptions</a>

<a href="/upload">⬆ Upload</a>

<a href="/logout">🚪 Logout</a>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="search-area">

<i class="fa fa-search" style="cursor:pointer" onclick="toggleSearch()"></i>

<input
id="searchBar"
class="form-control search-bar"
placeholder="Search videos"
>

<div class="mic-btn">
<i class="fa fa-microphone"></i>
</div>

</div>

<div style="display:flex;gap:20px;align-items:center">

<i class="fa fa-bell"></i>

<div class="avatar">
{{username[0]|upper}}{{username[1]|upper}}
</div>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="video-grid">

{% for video in videos %}

<div class="video-card">

<video controls>
<source src="/uploads/{{video}}" type="video/mp4">
</video>

<div class="video-info">

<p>{{video}}</p>

<div class="video-buttons">

<a href="/video/{{video}}" class="btn btn-light btn-sm">
Open
</a>

<a href="/delete/{{video}}" class="btn btn-danger btn-sm">
Delete
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

<script>

function toggleSearch(){

var search=document.getElementById("searchBar")

if(search.style.display==="none" || search.style.display===""){
search.style.display="block"
}else{
search.style.display="none"
}

}

</script>

</body>
</html>
